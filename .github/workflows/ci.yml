name: CI

on:
  push:
    branches:
      - "**"
    tags:
      - "*"
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: texlive/texlive:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Build package and docs
        run: |
          latex pdfprivacy.ins
          latexmk -pdf pdfprivacy.dtx

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: build-artifacts
          path: |
            *.pdf
            *.sty
          if-no-files-found: error

  test:
    runs-on: ubuntu-latest
    needs:
      - build
    container:
      image: texlive/texlive:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Download build artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          name: build-artifacts
          path: .

      - name: Install ExifTool
        run: |
          apt update
          apt install -y libimage-exiftool-perl

      - name: Run package tests
        run: |
          chmod +x tests/runPackageTests.sh
          tests/runPackageTests.sh

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: test-logs
          path: tests/**/*.log
          if-no-files-found: warn

  build-release:
    runs-on: ubuntu-latest
    needs:
      - build
    container:
      image: texlive/texlive:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Download build artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          name: build-artifacts
          path: .

      - name: Build CTAN release archive
        run: |
          apt update
          apt install -y cpanminus
          cpanm File::Copy::Recursive
          ctanify --pkgname=pdfprivacy --unixify --no-tds pdfprivacy.ins pdfprivacy.pdf README.md

      - name: Upload release archive
        uses: actions/upload-artifact@v7.0.1
        with:
          name: release-archive
          path: pdfprivacy.tar.gz
          if-no-files-found: error

  test-release:
    runs-on: ubuntu-latest
    needs:
      - build-release
    container:
      image: texlive/texlive:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Download release archive
        uses: actions/download-artifact@v8.0.1
        with:
          name: release-archive
          path: .

      - name: Validate CTAN package
        run: |
          curl -L https://mirrors.ctan.org/support/pkgcheck/bin/pkgcheck-x86_64-unknown-linux-musl -o pkgcheck
          tar -xvzf pdfprivacy.tar.gz
          chmod +x pkgcheck
          ./pkgcheck -d pdfprivacy

      - name: Re-upload release archive
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: release-archive-tested
          path: pdfprivacy.tar.gz
          if-no-files-found: warn

  publish-release:
    runs-on: ubuntu-latest
    needs:
      - test-release
      - build
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download release archive
        uses: actions/download-artifact@v8.0.1
        with:
          name: release-archive-tested
          path: .

      - name: Download build artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          name: build-artifacts
          path: .

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            pdfprivacy.tar.gz
            pdfprivacy.pdf
            pdfprivacy.sty